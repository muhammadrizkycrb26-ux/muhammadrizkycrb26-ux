name: Generate Animation

on:
  # Berjalan otomatis setiap 24 jam
  schedule:
    - cron: "0 */24 * * *"
  
  # Memungkinkan kita menjalankan robot ini secara manual kapan saja
  workflow_dispatch:
  
  # Berjalan otomatis setiap kali kamu update kode di branch main
  push:
    branches:
    - main

jobs:
  generate:
    permissions: 
      contents: write
    runs-on: ubuntu-latest
    timeout-minutes: 5
    
    steps:
      # Generates a snake game from a github user contributions graph and output a svg animation
      - name: generate github-contribution-grid-snake.svg
        uses: Platane/snk/svg-only@v3
        with:
          github_user_name: ${{ github.repository_owner }}
          outputs: |
            dist/github-contribution-grid-snake.svg?color_snake=#7952b3&color_dots=#161b22,#0e4429,#006d32,#26a641,#39d353
          
      # Push file .svg yang sudah jadi ke branch bernama "output"
      - name: push github-contribution-grid-snake.svg to the output branch
        uses: crazy-max/ghaction-github-pages@v3.1.0
        with:
          target_branch: output
          build_dir: dist
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
